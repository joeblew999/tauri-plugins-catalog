[tools]
"aqua:nushell/nushell" = "latest"

[tasks.validate]
description = "Verify plugins.jsonl: every line parses, required fields present"
run = "nu scripts/validate.nu"

[tasks.count]
description = "Entry count + official/third-party split"
run = "nu scripts/count.nu"

[tasks.sort]
description = "Sort plugins.jsonl by name, in place"
run = "nu scripts/sort.nu"

[tasks.render]
description = "Regenerate plugin table in README.md from plugins.jsonl"
run = "nu scripts/render.nu"

[tasks.search]
description = "Search plugins by name/description/tag (usage: mise run search <term>)"
run = "nu scripts/search.nu"

[tasks.install]
description = "Print install snippets for a plugin (usage: mise run install <name>)"
run = "nu scripts/install.nu"

[tasks.freshness]
description = "Check upstream pushed_at and detect catalog drift (requires gh)"
run = "nu scripts/freshness.nu"
