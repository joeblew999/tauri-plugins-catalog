[tools]
"aqua:nushell/nushell" = "latest"

[tasks."catalog:validate"]
description = "Verify plugins.jsonl matches schema.nuon"
run = "nu scripts/catalog/validate.nu"

[tasks."catalog:count"]
description = "Entry count + official/third-party split"
run = "nu scripts/catalog/count.nu"

[tasks."catalog:sort"]
description = "Sort plugins.jsonl by name, in place"
run = "nu scripts/catalog/sort.nu"

[tasks."catalog:render"]
description = "Regenerate plugin table in README.md from plugins.jsonl"
run = "nu scripts/catalog/render.nu"

[tasks."catalog:search"]
description = "Search plugins by name/description/tag (usage: mise run catalog:search <term>)"
run = "nu scripts/catalog/search.nu"

[tasks."catalog:install"]
description = "Print install snippets for a plugin (usage: mise run catalog:install <name>)"
run = "nu scripts/catalog/install.nu"

[tasks."catalog:freshness"]
description = "Check upstream pushed_at and detect catalog drift (requires gh)"
run = "nu scripts/catalog/freshness.nu"
