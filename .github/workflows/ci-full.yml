name: ci-full
# Full Android toolchain + end-to-end build on every OS. Heavy.
# Runs on push to main and manual dispatch (not on every PR).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  android-e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2

      - name: install Tauri Linux host deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev librsvg2-dev pkg-config

      - name: install tauri-cli (prebuilt)
        run: cargo binstall --no-confirm tauri-cli

      - name: install Android cmdline-tools via mise
        run: mise use -g vfox:mise-plugins/vfox-android-sdk@20.0

      - name: run tauri:android:setup (NDK + platforms + build-tools + rust targets)
        run: mise run tauri:android:setup

      - name: set NDK_HOME for subsequent steps
        shell: bash
        run: |
          ANDROID_HOME="$(mise where vfox:mise-plugins/vfox-android-sdk)"
          NDK_HOME="$ANDROID_HOME/ndk/27.0.12077973"
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "NDK_HOME=$NDK_HOME"        >> "$GITHUB_ENV"
          echo "Computed: $NDK_HOME"

      - name: tauri:doctor:android (should be fully green)
        run: mise run tauri:doctor:android

      - name: examples:build tauri-android-test (real APK end-to-end)
        run: mise run examples:build tauri-android-test

      - name: list built artifacts
        shell: bash
        run: |
          echo "=== APKs ==="
          find examples/tauri-android-test/src-tauri/gen/android/app/build/outputs -name "*.apk" -exec ls -lh {} \; || true
          echo "=== Desktop bundle ==="
          find examples/tauri-android-test/src-tauri/target/release/bundle -maxdepth 4 -type d 2>/dev/null | head -20 || true
