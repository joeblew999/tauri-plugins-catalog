name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise run lint:os-paths
      - run: mise run plugins:validate
      - run: mise run plugins:sort
      - run: mise run plugins:render
      - run: mise run examples:validate
      - name: plugins.jsonl and README must be sorted and regenerated
        shell: bash
        run: |
          if ! git diff --exit-code -- plugins.jsonl README.md; then
            echo "::error::JSONL or README is out of sync. Run 'mise run plugins:sort && mise run plugins:render' locally and commit."
            exit 1
          fi
